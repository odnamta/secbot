- name: mattermost
  platform: bugcrowd
  scope_file: scopes/mattermost.txt
  profile: stealth
  schedule: weekly
  enabled: true
  notes: >
    Team messaging (Go + React). Migrated HackerOne→Bugcrowd Nov 2024 with expanded
    scope — effectively a fresh program. Rich API = good IDOR/access-control surface.

- name: jenkins
  platform: other
  scope_file: scopes/jenkins.txt
  profile: stealth
  schedule: weekly
  enabled: true
  notes: >
    CI/CD automation, YesWeHack. Brand-new program (Nov 2025, EU Commission funded).
    Java + Jelly templates — excellent for SSRF/CSRF/XSS/info-disclosure.
