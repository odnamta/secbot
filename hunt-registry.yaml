- name: freshworks
  platform: hackerone
  scope_file: scopes/freshworks.txt
  profile: stealth
  schedule: biweekly
  enabled: true
  notes: >
    Multi-product CRM/helpdesk SaaS (Rails + React). Scope covers Freshdesk,
    Freshservice, Freshchat, Freshsales, Freshmarketer — each is a full web app.
    Large attack surface; rotate across sub-products each scan.

- name: wealthsimple
  platform: hackerone
  scope_file: scopes/wealthsimple.txt
  profile: stealth
  schedule: biweekly
  enabled: true
  notes: >
    Canadian fintech robo-advisor (Rails + React). Financial data = high bounty impact.
    $500-$10k estimated range. Strong fit for auth/IDOR/CORS checks.
    Requires HackerOne alias account + dedicated test account (no real trades).
